<svg viewBox="0 0 600 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6ef7"/>
      <stop offset="100%" stop-color="#7e15f7"/>
    </radialGradient>
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7">
        <animate attributeName="stdDeviation" values="5;11;5" dur="2.5s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>
  </defs>

  <circle cx="300" cy="300" r="170" fill="none" stroke="#7e15f7" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="2 8"/>
  <circle cx="300" cy="300" r="260" fill="none" stroke="#b347ff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="2 10"/>

  <!-- inner ring: Web Dev, Backend Dev, Cyber Security, DevSecOps, AI Engineering -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="360 300 300" dur="20s" repeatCount="indefinite"/>

    <!-- Web Dev: React atom -->
    <g transform="translate(300,130)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <g stroke="#61DAFB" fill="none" stroke-width="1.6">
        <ellipse rx="14" ry="5.5"/>
        <ellipse rx="14" ry="5.5" transform="rotate(60)"/>
        <ellipse rx="14" ry="5.5" transform="rotate(120)"/>
      </g>
      <circle r="2.6" fill="#61DAFB"/>
    </g>

    <!-- Backend Dev: hexagon -->
    <g transform="translate(461.7,247.5)">
      <circle r="34" fill="#0d1117" stroke="#ff6ef7" stroke-width="3"/>
      <polygon points="0,-13 11.3,-6.5 11.3,6.5 0,13 -11.3,6.5 -11.3,-6.5" fill="none" stroke="#68A063" stroke-width="2"/>
      <polygon points="0,-7 6,-3.5 6,3.5 0,7 -6,3.5 -6,-3.5" fill="#68A063" opacity="0.4"/>
    </g>

    <!-- Cyber Security: padlock -->
    <g transform="translate(400,437.5)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <rect x="-8" y="-1" width="16" height="13" rx="2" fill="none" stroke="#ff5f56" stroke-width="2"/>
      <path d="M -5,-1 V -6 a5,5 0 0 1 10,0 V -1" fill="none" stroke="#ff5f56" stroke-width="2"/>
      <circle cy="5" r="1.8" fill="#ff5f56"/>
    </g>

    <!-- DevSecOps: gear -->
    <g transform="translate(200,437.5)">
      <circle r="34" fill="#0d1117" stroke="#ff6ef7" stroke-width="3"/>
      <circle r="7" fill="none" stroke="#b347ff" stroke-width="2"/>
      <circle r="2.5" fill="#b347ff"/>
      <g stroke="#b347ff" stroke-width="2.5">
        <line x1="0" y1="-13" x2="0" y2="-9"/>
        <line x1="0" y1="13" x2="0" y2="9"/>
        <line x1="-13" y1="0" x2="-9" y2="0"/>
        <line x1="13" y1="0" x2="9" y2="0"/>
        <line x1="-9.2" y1="-9.2" x2="-6.4" y2="-6.4"/>
        <line x1="9.2" y1="9.2" x2="6.4" y2="6.4"/>
        <line x1="-9.2" y1="9.2" x2="-6.4" y2="6.4"/>
        <line x1="9.2" y1="-9.2" x2="6.4" y2="-6.4"/>
      </g>
    </g>

    <!-- AI Engineering: neural network -->
    <g transform="translate(138.3,247.5)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <g stroke="#b347ff" stroke-width="1.3">
        <line x1="0" y1="-11" x2="-9" y2="6"/>
        <line x1="0" y1="-11" x2="9" y2="6"/>
        <line x1="-9" y1="6" x2="9" y2="6"/>
        <line x1="0" y1="-11" x2="0" y2="0"/>
        <line x1="-9" y1="6" x2="0" y2="0"/>
        <line x1="9" y1="6" x2="0" y2="0"/>
      </g>
      <circle cx="0" cy="-11" r="3" fill="#b347ff"/>
      <circle cx="-9" cy="6" r="3" fill="#b347ff"/>
      <circle cx="9" cy="6" r="3" fill="#b347ff"/>
      <circle cx="0" cy="0" r="2.5" fill="#ff6ef7"/>
    </g>
  </g>

  <!-- outer ring: Mobile Dev, Blockchain, DevOps, Microservices, AI Automation -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 300 300" to="0 300 300" dur="30s" repeatCount="indefinite"/>

    <!-- Mobile Dev: phone -->
    <g transform="translate(452.9,89.7)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <rect x="-6" y="-13" width="12" height="26" rx="3" fill="none" stroke="#7e15f7" stroke-width="2"/>
      <circle cy="9" r="1.5" fill="#7e15f7"/>
    </g>

    <!-- Blockchain: chain links -->
    <g transform="translate(547.3,380.3)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <rect x="-11" y="-5" width="10" height="10" rx="3" fill="none" stroke="#f0b90b" stroke-width="2"/>
      <rect x="1" y="-5" width="10" height="10" rx="3" fill="none" stroke="#f0b90b" stroke-width="2"/>
    </g>

    <!-- DevOps: infinity loop -->
    <g transform="translate(300,560)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <circle cx="-6" cy="0" r="7" fill="none" stroke="#ff8a00" stroke-width="2.5"/>
      <circle cx="6" cy="0" r="7" fill="none" stroke="#ff8a00" stroke-width="2.5"/>
    </g>

    <!-- Microservices: connected nodes -->
    <g transform="translate(52.7,380.3)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <g stroke="#ff6ef7" stroke-width="1.5">
        <line x1="0" y1="-10" x2="-9" y2="7"/>
        <line x1="0" y1="-10" x2="9" y2="7"/>
        <line x1="-9" y1="7" x2="9" y2="7"/>
      </g>
      <circle cx="0" cy="-10" r="3.2" fill="#ff6ef7"/>
      <circle cx="-9" cy="7" r="3.2" fill="#ff6ef7"/>
      <circle cx="9" cy="7" r="3.2" fill="#ff6ef7"/>
    </g>

    <!-- AI Automation: robot face -->
    <g transform="translate(147.1,89.7)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <rect x="-9" y="-7" width="18" height="15" rx="4" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="-4" cy="0" r="1.8" fill="#00d4ff"/>
      <circle cx="4" cy="0" r="1.8" fill="#00d4ff"/>
      <line x1="0" y1="-7" x2="0" y2="-11" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="0" cy="-12" r="1.5" fill="#00d4ff"/>
      <line x1="-4" y1="5" x2="4" y2="5" stroke="#00d4ff" stroke-width="1.5"/>
    </g>
  </g>

  <!-- core -->
  <circle cx="300" cy="300" r="95" fill="url(#coreGrad)" filter="url(#coreGlow)"/>
  <text x="300" y="315" text-anchor="middle" font-family="Verdana, sans-serif" font-size="52" font-weight="bold" fill="#0d1117">FA</text>

  <text x="300" y="650" text-anchor="middle" font-family="Verdana, sans-serif" font-size="17" fill="#c9baf0" letter-spacing="1">FARZEEN ALI - FOUNDER AND CEO, THE TECHZEEN</text>
</svg>
