<svg viewBox="0 0 600 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6ef7"/>
      <stop offset="100%" stop-color="#7e15f7"/>
    </radialGradient>
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7">
        <animate attributeName="stdDeviation" values="5;11;5" dur="2.5s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>
  </defs>

  <circle cx="300" cy="300" r="170" fill="none" stroke="#7e15f7" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="2 8"/>
  <circle cx="300" cy="300" r="260" fill="none" stroke="#b347ff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="2 10"/>

  <!-- inner ring: Web Dev, Backend Dev, Cyber Security, DevSecOps, AI Engineering -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="360 300 300" dur="20s" repeatCount="indefinite"/>

    <g transform="translate(300,130)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/React-Dark.svg" x="-17" y="-17" width="34" height="34"/>
    </g>
    <g transform="translate(461.7,247.5)">
      <circle r="34" fill="#0d1117" stroke="#ff6ef7" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/NodeJS-Dark.svg" x="-17" y="-17" width="34" height="34"/>
    </g>
    <g transform="translate(400,437.5)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Kali-Dark.svg" x="-17" y="-17" width="34" height="34"/>
    </g>
    <g transform="translate(200,437.5)">
      <circle r="34" fill="#0d1117" stroke="#ff6ef7" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Kubernetes.svg" x="-17" y="-17" width="34" height="34"/>
    </g>
    <g transform="translate(138.3,247.5)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/TensorFlow-Dark.svg" x="-17" y="-17" width="34" height="34"/>
    </g>
  </g>

  <!-- outer ring: Mobile Dev, Blockchain, DevOps, Microservices, AI Automation -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 300 300" to="0 300 300" dur="30s" repeatCount="indefinite"/>

    <g transform="translate(452.9,89.7)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/AndroidStudio-Dark.svg" x="-15" y="-15" width="30" height="30"/>
    </g>
    <g transform="translate(547.3,380.3)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Solidity.svg" x="-15" y="-15" width="30" height="30"/>
    </g>
    <g transform="translate(300,560)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Docker.svg" x="-15" y="-15" width="30" height="30"/>
    </g>
    <g transform="translate(52.7,380.3)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/NestJS-Dark.svg" x="-15" y="-15" width="30" height="30"/>
    </g>
    <g transform="translate(147.1,89.7)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <image href="https://raw.githubusercontent.com/tandpfun/skill-icons/main/icons/Python-Dark.svg" x="-15" y="-15" width="30" height="30"/>
    </g>
  </g>

  <!-- core -->
  <circle cx="300" cy="300" r="95" fill="url(#coreGrad)" filter="url(#coreGlow)"/>
  <text x="300" y="315" text-anchor="middle" font-family="Verdana, sans-serif" font-size="52" font-weight="bold" fill="#0d1117">FA</text>

  <text x="300" y="650" text-anchor="middle" font-family="Verdana, sans-serif" font-size="17" fill="#c9baf0" letter-spacing="1">FARZEEN ALI - FOUNDER AND CEO, THE TECHZEEN</text>
</svg>
