<svg viewBox="0 0 600 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6ef7"/>
      <stop offset="100%" stop-color="#7e15f7"/>
    </radialGradient>
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7">
        <animate attributeName="stdDeviation" values="5;11;5" dur="2.5s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>
  </defs>
  <circle cx="300" cy="300" r="170" fill="none" stroke="#7e15f7" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="2 8"/>
  <circle cx="300" cy="300" r="260" fill="none" stroke="#b347ff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="2 10"/>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 300 300" to="360 300 300" dur="18s" repeatCount="indefinite"/>
    <g transform="translate(300,130)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <text x="0" y="11" text-anchor="middle" font-size="30">CODE</text>
    </g>
    <g transform="translate(470,300)">
      <circle r="34" fill="#0d1117" stroke="#ff6ef7" stroke-width="3"/>
      <text x="0" y="11" text-anchor="middle" font-size="18" fill="#ffffff">SEC</text>
    </g>
    <g transform="translate(300,470)">
      <circle r="34" fill="#0d1117" stroke="#7e15f7" stroke-width="3"/>
      <text x="0" y="11" text-anchor="middle" font-size="16" fill="#ffffff">OPS</text>
    </g>
    <g transform="translate(130,300)">
      <circle r="34" fill="#0d1117" stroke="#ff6ef7" stroke-width="3"/>
      <text x="0" y="11" text-anchor="middle" font-size="16" fill="#ffffff">AI</text>
    </g>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 300 300" to="0 300 300" dur="26s" repeatCount="indefinite"/>
    <g transform="translate(484,116)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" fill="#ffffff">CHAIN</text>
    </g>
    <g transform="translate(484,484)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" fill="#ffffff">MOBILE</text>
    </g>
    <g transform="translate(116,484)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" fill="#ffffff">CLOUD</text>
    </g>
    <g transform="translate(116,116)">
      <circle r="30" fill="#0d1117" stroke="#b347ff" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-size="14" fill="#ffffff">EDU</text>
    </g>
  </g>
  <circle cx="300" cy="300" r="95" fill="url(#coreGrad)" filter="url(#coreGlow)"/>
  <text x="300" y="315" text-anchor="middle" font-family="Verdana, sans-serif" font-size="52" font-weight="bold" fill="#0d1117">FA</text>
  <text x="300" y="610" text-anchor="middle" font-family="Verdana, sans-serif" font-size="17" fill="#c9baf0" letter-spacing="1">FARZEEN ALI - FOUNDER AND CEO, THE TECHZEEN</text>
</svg>
